<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Server IP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#000000,#1a1a1a,#333333);
    color:white;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:35px;
    border-radius:15px;
    backdrop-filter:blur(8px);
    box-shadow:0 0 20px rgba(0,0,0,.6);
    text-align:center;
}

h1{
    margin-bottom:20px;
    font-size:28px;
}

.ip{
    font-size:22px;
    background:#111;
    padding:15px;
    border-radius:10px;
    border:1px solid #555;
    margin-bottom:20px;
    user-select:all;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#00c853;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    background:#00e676;
    transform:scale(1.05);
}

#status{
    margin-top:15px;
    color:#8cff8c;
    font-size:15px;
}
</style>

</head>
<body>

<div class="card">
    <h1>Minecraft Server</h1>

    <div class="ip" id="ip">
        four-clinton.gl.joinmc.link
    </div>

    <button onclick="copyIP()">📋 Copy IP</button>

    <div id="status"></div>
</div>

<script>
function copyIP(){
    const ip = "four-clinton.gl.joinmc.link";

    navigator.clipboard.writeText(ip).then(() => {
        document.getElementById("status").innerHTML = "✅ IP berhasil disalin!";
    }).catch(() => {
        document.getElementById("status").innerHTML = "❌ Gagal menyalin IP.";
    });
}
</script>

</body>
</html>
